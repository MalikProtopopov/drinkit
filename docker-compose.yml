version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: juicy
      POSTGRES_USER: juicy
      POSTGRES_PASSWORD: juicy
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://juicy:juicy@db:5432/juicy
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on: [db, redis]
volumes:
  pgdata:
